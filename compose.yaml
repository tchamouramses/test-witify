services:
    mysql:
        image: 'mysql:8.4'
        ports:
            - '${DB_PORT:-3307}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-password}'
            MYSQL_DATABASE: '${DB_DATABASE:-takehome}'
        volumes:
            - 'mysql-data:/var/lib/mysql'
            - './docker/mysql/init:/docker-entrypoint-initdb.d'
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-h'
                - localhost
                - '-p${DB_PASSWORD:-password}'
            retries: 10
            timeout: 5s
            interval: 5s

volumes:
    mysql-data:
